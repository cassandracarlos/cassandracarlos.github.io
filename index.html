   <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600&display=swap');

* {
   margin: 0;
   box-sizing: border-box;
}

:root {
   --font-body: "Work Sans", Arial, Helvetica, sans-serif;
   --font-header: "Montserrat", Arial, Helvetica, sans-serif;
   --colour-bg: #fefefe;
   --colour-text: #30302e;
   --colour-accent: #cb0a51;
   --colour-caption: #a5a59c;
   --colour-bold: #212121;
   --image-radius: 12px;
   --small-gap: 10px;
   --large-gap: 20px;
}

body {
   font-family: var(--font-body);
   line-height: 1.8;
   color: var(--colour-text);
   background-color: var(--colour-bg);
}

img {
   max-width: 24px;
   height: auto;
   filter: opacity(75%);
}

h1, h2, h3 {
   font-family: var(--font-header);
   color: var(--colour-bold);
}

main {
   padding: 1rem 2rem;
         max-width: 400px;
         margin: 0 auto;
}

main a {
text-decoration: none;
   color: var(--colour-text);
   display: flex;
   align-items: center;
}

footer {
   padding: 1rem 2rem;
   text-align: center;
   border-top: 1px solid var(--colour-caption);
}

@media (max-width: 768px) {
   main {
      padding: 1rem;
   }
}

      /*.cta {

      form label {
         display: block;
         margin-bottom: 1rem;
         font-weight: 600;
         color: #1e1e1e;
      }
      .socials {
         margin: 1rem 0;
         display: flex;
      }
      .socials a:hover {
         color: #575754;
         text-decoration: underline;
      }
      form input, form textarea {
         width: 100%;
         padding: 0.6rem;
         margin-top: 0.4rem;
         border: 1px solid #5c5c51;
         font-size: 1rem;
         font-family: inherit;
      }
      form textarea {
         min-height: 120px;
         resize: vertical;
      }
      form button {
         display: inline-block;
         padding: 0.7rem 1.2rem;
         background: #1e1e1e;
         color: #fefefe;
         border: none;
         cursor: pointer;
      }
      form button:hover {
         background: #cb0a51;
      }
   </style>
